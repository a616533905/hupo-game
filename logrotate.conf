/root/hupo-game/logs/bridge_*.log
/root/hupo-game/logs/voice_*.log
/root/hupo-game/logs/soar.log
/root/hupo-game/logs/health_check.log
/root/hupo-game/logs/health_full.log
/root/hupo-game/logs/recover.log
/root/hupo-game/logs/audit_cron.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        systemctl reload hupo-bridge > /dev/null 2>&1 || true
        systemctl reload hupo-voice > /dev/null 2>&1 || true
    endscript
}
